name: Cleanup Old Images

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_NAME: rnd-app

jobs:
  cleanup:
    name: Delete Old GCR Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old images (keep last 5)
        run: |
          # Get all image digests except the latest 5
          gcloud container images list-tags \
            gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }} \
            --format="get(digest)" \
            --sort-by=~timestamp \
            --limit=999 \
            | tail -n +6 \
            | while read digest; do
              echo "Deleting gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}@${digest}"
              gcloud container images delete \
                "gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}@${digest}" \
                --quiet
            done

      - name: Summary
        run: |
          echo "Remaining images:"
          gcloud container images list-tags \
            gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }} \
            --format="table(tags,timestamp)"

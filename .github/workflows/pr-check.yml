name: PR Quality Check

on:
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build rnd-ui
        run: npm run build:ui

      - name: Build portfolio
        run: npm run build:portfolio

      - name: Check build output
        run: |
          if [ ! -d "apps/portfolio/out" ]; then
            echo "Build failed: apps/portfolio/out directory not found"
            exit 1
          fi
          echo "Build successful"
